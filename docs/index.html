<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#06141c">
    <link rel="icon" href="data:,">
    <title>Pirate Broadside</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #06141c;
        color: #fff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }
      #game-shell {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #06141c;
      }
      #unity-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #06141c;
        outline: none;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #06141c;
        transition: opacity 260ms ease;
        z-index: 2;
      }
      #loading.done {
        opacity: 0;
        pointer-events: none;
      }
      .loading-inner {
        width: min(420px, 74vw);
        text-align: center;
      }
      .title {
        margin: 0 0 18px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(30px, 5vw, 56px);
        font-weight: 700;
        letter-spacing: 0;
      }
      .kicker {
        margin-bottom: 10px;
        color: #e9a537;
        font-size: 13px;
        font-weight: 800;
      }
      .track {
        height: 5px;
        overflow: hidden;
        background: #193744;
      }
      #progress {
        width: 0%;
        height: 100%;
        background: #e96d25;
        transition: width 120ms linear;
      }
      #status {
        margin-top: 12px;
        color: #b8ced7;
        font-size: 13px;
      }
      @media (max-aspect-ratio: 4/3) {
        #unity-canvas {
          width: 100vw;
          height: auto;
          aspect-ratio: 16 / 9;
        }
      }
    </style>
  </head>
  <body>
    <main id="game-shell">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
    </main>
    <div id="loading">
      <div class="loading-inner">
        <div class="kicker">TACTICAL NAVAL COMBAT</div>
        <h1 class="title">PIRATE BROADSIDE</h1>
        <div class="track"><div id="progress"></div></div>
        <div id="status">Preparing the fleet...</div>
      </div>
    </div>
    <script src="Build/WebGL.loader.js"></script>
    <script>
      const canvas = document.querySelector("#unity-canvas");
      const loading = document.querySelector("#loading");
      const progress = document.querySelector("#progress");
      const status = document.querySelector("#status");

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/WebGL.data.unityweb",
        frameworkUrl: "Build/WebGL.framework.js.unityweb",
        codeUrl: "Build/WebGL.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Masafykun Games",
        productName: "Pirate Broadside",
        productVersion: "0.1.0",
        autoSyncPersistentDataPath: true,
        matchWebGLToCanvasSize: true
      }, (value) => {
        progress.style.width = Math.round(value * 100) + "%";
        status.textContent = value < 0.9 ? "Loading cannon and sail..." : "Taking the helm...";
      }).then(() => {
        loading.classList.add("done");
        canvas.focus();
      }).catch((message) => {
        status.textContent = "Unable to launch: " + message;
        status.style.color = "#ff806b";
      });
    </script>
  </body>
</html>
